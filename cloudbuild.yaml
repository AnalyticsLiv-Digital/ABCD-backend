steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/dx-api-project/abcd-backend:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/dx-api-project/abcd-backend:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'abcd-backend'
      - '--image=gcr.io/dx-api-project/abcd-backend:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'

images:
  - 'gcr.io/dx-api-project/abcd-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
